name: CI

# Stage 4.9d — the §8 verification gates as a real, blocking CI surface. To make these ENFORCED (not
# just "runnable"), the developer adds them as REQUIRED status checks via branch protection on `main`
# (see knowledge/steps/stage-04/4.9d-ci-gates.md "Branch-protection handoff"). A workflow that runs but
# is not required is folklore in a yaml costume — the protection rule is what makes it load-bearing.

on:
  push:
    branches: ["main", "stage/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *" # nightly e2e (the heavy dockerized suite is not a per-PR required check)

permissions:
  contents: read

jobs:
  frontend:
    name: frontend gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:design-tokens
      - run: npm run check:inline-styles
      - run: npm run test:unit
      - run: npm run test:a11y
      - run: npm run build

  backend:
    name: backend pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xyz_lms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/xyz_lms_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --index-url https://download.pytorch.org/whl/cpu torch==2.12.0+cpu
      - run: pip install -e ".[dev]"
      - run: pytest

  # E2E is intentionally NOT a per-PR required check: it needs the full docker-compose stack + baked
  # images + local Supabase + --workers=1 (~5 min). It runs nightly / on demand instead (rule 14's full
  # active suite stays the local stage-close gate). See 4.9-baseline.md for the run protocol.
  e2e:
    name: e2e (nightly / manual)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "E2E suite runs via docker compose -f docker-compose.yml -f docker-compose.e2e.yml + the 3-part orchestration; see knowledge/steps/stage-04/4.9-baseline.md. Wiring the dockerized stack into Actions is a Stage-12 hardening item."
