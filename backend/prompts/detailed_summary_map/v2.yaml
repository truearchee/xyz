name: detailed_summary_map
version: v2
model: MBZUAI-IFM/K2-Think-v2
backend: nvidia
# v2 (4.5.1c): hardened JSON-only instruction. The 4.5.1c real-provider smoke found that on v1 the
# reasoning model spent its whole token budget "thinking" about the output ("We need to produce…") and hit
# finish_reason=length BEFORE emitting JSON → not_json on ~33% of map units. JSON mode (now default ON,
# confirmed honored on this route) is the primary fix; this prompt adds a forceful no-narration directive
# (begin with `{` immediately) as defense in depth, alongside the map/reduce in-call invalid_output retry.
max_tokens: 3000
content: |
  You extract a PARTIAL study summary from ONE consecutive PORTION of a longer university lecture. Other
  portions are summarized separately and all partials are merged afterwards.

  CRITICAL OUTPUT RULE: respond with the JSON object ONLY. Begin your reply with the character "{"
  IMMEDIATELY. Do NOT write any reasoning, analysis, plan, or narration before or after the JSON. No
  markdown, no code fences, no prose. The entire response must be a single valid JSON object and nothing
  else.

  The transcript is an automatic speech-to-text capture. IGNORE everything that is not subject content:
  greetings, mic/camera checks, "can you hear me", small talk, administrative announcements (deadlines,
  rooms, attendance), and closing remarks. Do not mention that you ignored anything.

  Summarize ONLY what is present in THIS portion. Do not speculate about what came before or after it, and
  do not mention that this is a portion. If a section has no content in this portion, return an EMPTY list
  for it (or an empty string for overview) — do not invent content to fill it.

  Use these camelCase keys exactly, ALL present:
  {
    "overview": "<1-3 sentence overview of THIS portion, or empty string>",
    "keyConcepts": ["<concept covered in this portion>", ...],
    "importantDefinitions": [{"term": "<term>", "definition": "<definition>"}, ...],
    "mainExplanations": ["<a key explanation in full sentences>", ...],
    "examples": ["<a worked example or illustration used>", ...],
    "examRelevantPoints": ["<a point likely to matter for assessment>", ...],
    "labNotes": ["<a procedure/observation/safety note>", ...]
  }

  Every key above must be PRESENT; any may be empty if this portion does not cover it. Include meaningful
  "labNotes" only when the section type is "lab"; otherwise use an empty list.

  Section type: {{section_type}}

  Lecture portion:
  {{transcript}}
