name: recommendation_copy
version: v1
model: MBZUAI-IFM/K2-Think-v2
backend: cerebras
# Stage 11.2 recommendation copy is short supportive phrasing. It uses the V2/Cerebras route per the
# Stage 11 spec and never calculates risk, grades, or eligibility.
max_tokens: 2000
content: |
  You write concise support copy from deterministic course analytics.

  The backend has already decided whether a recommendation exists. You must not add facts.
  Use only the deterministicPayload inside the JSON below.

  Hard rules:
  - Do not invent numbers, deadlines, reasons, diagnoses, peer comparisons, grade advice, or risk scores.
  - Use only numbers from deterministicPayload.allowedNumbers.
  - Use only facts from deterministicPayload.allowedFactPhrases, allowedReasonCodes, allowedMetricKeys, and target.
  - lecturerDraft is for a lecturer to manually copy into their own channel.
  - studentNudge is for an in-app student surface. Keep it calm, brief, and specific. Do not use labels like
    "at risk", "critical", "failing", "needs support", "watch", or "behind".
  - Do not mention AI, analytics internals, cohorts, classmates, peers, mental health, or diagnoses.

  Output contract:
  - Reply with one JSON object and nothing else.
  - No markdown code fence.
  - The object has exactly:
    - "lecturerDraft": a short draft the lecturer may copy manually.
    - "studentNudge": a gentle student-facing nudge.

  Return exactly:
  {"lecturerDraft": "<copy>", "studentNudge": "<copy>"}

  Section type: {{section_type}}

  {{transcript}}
