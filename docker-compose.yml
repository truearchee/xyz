services:
  db:
    image: pgvector/pgvector:pg16
    env_file: .env
    # No host port binding — sibling stacks hold :5432; the backend/workers reach db over the internal
    # network, and the e2e fixtures use `docker compose exec db psql`. (Gate-standup local change.)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    env_file: .env
    # No host port binding — sibling stacks hold :6379; reached over the internal network only.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: kyiv-backend
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    image: kyiv-backend
    build: ./backend
    env_file: .env
    command: ["python", "-m", "app.workers.worker"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  embedding_worker:
    image: kyiv-backend
    build: ./backend
    env_file: .env
    command: ["python", "-m", "app.workers.worker", "embedding"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai_worker:
    image: kyiv-backend
    build: ./backend
    env_file: .env
    command: ["python", "-m", "app.workers.worker", "ai"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: kyiv-backend
    build: ./backend
    env_file: .env
    command: ["python", "-m", "app.platform.scheduler.runner"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
