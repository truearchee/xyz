# E2E forced-fault override (Stage 4.5d Gate 2). Sets the deterministic provider fault on the
# ai_worker (global env). Use with a single fault per stack run; restore by recreating ai_worker
# without this override. Non-prod only — DeterministicTestProvider refuses faults outside non-prod.
services:
  ai_worker:
    environment:
      LLM_FAULT_INJECTION: ${LLM_FAULT_INJECTION:-}
